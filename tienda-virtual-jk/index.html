<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página Simple</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        h1 { color: darkblue; }
    </style>
</head>
<body>

    <h1>¡Funciona con un solo archivo!</h1>
    <p>No necesité carpetas ni archivos extra para esto.</p>
    <button onclick="saludar()">Haz clic aquí</button>

    <script>
        function saludar() {
            alert("¡Hola desde un solo archivo HTML!");
        }
    </script>
</body>
</html>
